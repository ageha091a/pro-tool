<body>

<div class="app-container">
    <nav>
        <div class="mb-6 text-blue-500 text-2xl">
            <i class="fas fa-bolt"></i>
        </div>
        <button onclick="openTab(event, 'token')" class="tab-btn active" title="トークン"><i class="fas fa-key"></i></button>
        <button onclick="openTab(event, 'target')" class="tab-btn" title="送信先"><i class="fas fa-crosshairs"></i></button>
        <button onclick="openTab(event, 'mention')" class="tab-btn" title="メンション"><i class="fas fa-at"></i></button>
        <button onclick="openTab(event, 'message')" class="tab-btn" title="メッセージ"><i class="fas fa-comment-alt"></i></button>
        <button onclick="openTab(event, 'config')" class="tab-btn" title="設定・実行"><i class="fas fa-play"></i></button>
    </nav>

    <div class="main-content">
        <header class="flex flex-wrap justify-between items-center gap-2">
            <div>
                <h1 class="text-xl font-bold text-slate-800">tokenRAID <span class="text-blue-500">｜PRO</span></h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">agehanto spamer</p>
            </div>
            <div id="status-badge" class="px-3 py-1 rounded-full bg-white/50 text-[10px] font-bold border border-white/60 text-slate-600 shadow-sm">
                待機中
            </div>
        </header>

        <div id="token" class="tab-content active">
            <div class="glass-card">
                <label class="block text-sm font-bold mb-3 text-slate-700">アカウントトークン (1行1つ)</label>
                <textarea id="token-input" class="h-64" placeholder="MTQ5Sedd........"></textarea>
            </div>
        </div>

        <div id="target" class="tab-content">
            <div class="glass-card">
                <label class="block text-sm font-bold mb-2 text-slate-700">サーバーID (取得用)</label>
                <div class="flex gap-2">
                    <input type="text" id="server-id" placeholder="サーバーIDを入力...">
                    <button onclick="fetchServerData('channels')" class="px-4 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-xl transition text-xs whitespace-nowrap">
                        自動取得
                    </button>
                </div>
            </div>
            <div class="glass-card">
                <label class="block text-sm font-bold mb-2 text-slate-700">チャンネルIDリスト</label>
                <textarea id="target-input" class="h-40" placeholder="取得ボタンを押すと自動入力されます..."></textarea>
            </div>
        </div>

        <div id="mention" class="tab-content">
            <div class="glass-card">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-sm font-bold text-slate-700">メンション対象 (ユーザーID)</label>
                    <button onclick="fetchServerData('members')" class="px-3 py-1 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-lg transition text-[10px]">
                        自動取得
                    </button>
                </div>
                <textarea id="mention-input" class="h-64" placeholder="サーバーIDを入力して「抽出」を押してください..."></textarea>
            </div>
        </div>

        <div id="message" class="tab-content">
            <div class="glass-card">
                <label class="block text-sm font-bold mb-3 text-slate-700">内容</label>
                <div id="msg-container" class="space-y-3">
                    <input type="text" class="msg-input" placeholder="メッセージを入力...">
                <input type="text" class="w-full mt-2 msg-input" placeholder="テンプレート #2"><input type="text" class="w-full mt-2 msg-input" placeholder="テンプレート #3"><input type="text" class="w-full mt-2 msg-input" placeholder="テンプレート #4"><input type="text" class="w-full mt-2 msg-input" placeholder="テンプレート #5"><input type="text" class="w-full mt-2 msg-input" placeholder="テンプレート #6"><input type="text" class="w-full mt-2 msg-input" placeholder="テンプレート #7"></div>
                <button onclick="addMessage()" class="mt-4 w-full py-2 border-2 border-dashed border-white/60 text-slate-600 hover:border-blue-400 hover:text-blue-500 rounded-xl text-xs font-bold transition">
                    + 
                </button>
            </div>
        </div>

        <div id="config" class="tab-content">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="glass-card mb-0">
                    <label class="block text-[11px] font-bold mb-2 uppercase text-slate-600">ランダム文字列y/n4</label>
                    <input type="text" id="use-random" class="text-center font-bold" value="y">
                </div>
       <div class="glass-card mb-0">
    <label class="block text-[11px] font-bold mb-2 uppercase text-slate-600">送信間隔 (秒)</label>
    <input type="number" id="interval" class="text-center font-bold" value="60" step="0.1" min="0.1">
</div>
            </div>
            <div class="glass-card">
                <div id="terminal"><p style="color: rgb(248, 113, 113);">[21:07:25] エラー: サーバーIDとトークンが必要です。</p></div>
            </div>
            <div class="flex gap-4">
                <button onclick="startBroadcast()" class="flex-1 py-4 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-2xl shadow-lg transition active:scale-95">開始</button>
                <button onclick="stopBroadcast()" class="flex-1 py-4 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-2xl shadow-lg transition active:scale-95">停止</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body></html>
